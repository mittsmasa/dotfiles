[tools]
node = "24.18.0"
pnpm = "11.11.0"
starship = "1.26.0"
"npm:@playwright/cli" = "0.1.17"
"npm:skills" = "1.5.16"
chezmoi = "2.71.0"
gitleaks = "8.30.1"
gh = "2.96.0"
bun = "1.3.14"
"npm:@github/copilot" = "1.0.70"
just = "1.56.0"
"npm:vercel" = "55.0.0"
uv = "0.11.28"
age = "latest"
"github:jdx/fnox" = "1.28.0"
ffmpeg = "8.1.2"
"github:yusukebe/ax" = { version = "0.1.10", exe = "ax" }

[settings]
idiomatic_version_file_enable_tools = ["node"]
minimum_release_age = "7d"
# mise use を常に exact version で config に書く（--pin のデフォルト化）
pin = true
disable_backends = ["asdf", "cargo", "conda", "dotnet", "forgejo", "gem", "gitlab", "go", "pipx", "spm", "http", "s3", "ubi", "vfox"]
