[tools]
node = "24.15.0"
pnpm = "10.33.0"
starship = "1.24.2"
"npm:@playwright/cli" = "0.1.11"
"npm:difit" = "4.0.4"
"npm:skills" = "1.5.1"
chezmoi = "2.70.2"
gitleaks = "8.30.1"
gh = "2.92.0"
bun = "1.3.14"
"npm:@github/copilot" = "1.0.48"
just = "latest"
"npm:vercel" = "54.5.1"

[settings]
idiomatic_version_file_enable_tools = ["node"]
minimum_release_age = "7d"

# gh は keyring にトークンを保存しており mise のデフォルト hosts.yml 連携では読めないため、
# gh に直接問い合わせてトークンを取得する。これで GitHub API の rate limit (403) を回避する。
[settings.github]
credential_command = "gh auth token"
